<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clicker Evolutivo</title>

<style>

body {
    background-image: url("fondopipe.jpg");
    background-size: cover;
    background-position: center;
    font-family: Arial;
    text-align: center;
    margin-top: 20px;
}

#contador {
    font-size: 70px;
    color: white;
    text-shadow: 2px 2px 5px black;
}

#poder, #pps {
    font-size: 22px;
    color: white;
    text-shadow: 2px 2px 5px black;
}

#clicker {
    width: 280px;
    cursor: pointer;
    transition: 0.2s;
}

#clicker:hover {
    transform: scale(1.05);
}

/* TIENDA */
.tienda {
    position: fixed;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    background: rgba(255,255,255,0.2);
    border: 2px solid black;
    border-radius: 15px;
    padding: 10px;
    width: 250px;
    max-height: 80vh;
    overflow-y: auto;
}

button {
    margin: 5px 0;
}

/* CAJA */
#overlayCaja {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

#cajaAnimada {
    font-size: 120px;
    animation: abrirCaja 0.8s ease-in-out;
}

@keyframes abrirCaja {
    0% { transform: scale(0.2) rotate(-10deg); opacity: 0; }
    50% { transform: scale(1.3) rotate(10deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

</style>
</head>

<body>

<h1>🎮 Clicker Evolutivo</h1>

<div id="contador">0</div>
<div id="poder">Puntos por clic: 1</div>
<div id="pps">Multiplicador total</div>

<img id="clicker" src="bastinormal.jpg" onclick="sumarClick()">

<br><br>

<button onclick="abrirCaja()">🎁 Abrir caja</button>
<button onclick="reiniciarJuego()">🔄 Reiniciar</button>

<button onclick="prestigiar()">👑 Prestigiar</button>

<div id="inventario">Inventario: x1</div>

<div class="tienda">

<h2>🏪 Tienda</h2>

<button onclick="comprarMejora(100,1,'click')">
    +1 clic <br> Costo:100 <span id="c1">100</span>
</button>

<button onclick="comprarMejora(500,5,'click')">
    +5 clic <br> Costo: 500
</button>

<button onclick="comprarMejora(2000,20,'click')">
    +20 clic <br> Costo: 2000
</button>

<button onclick="comprarMejora(10000,100,'click')">
    +100 clic <br> Costo: 10000
</button>

<button onclick="comprarMejora(50000,500,'click')">
    +500 clic <br> Costo: 50000
</button>

<button onclick="comprarMejora(100000,1000,'click')">
    +1000 clic <br> Costo: 100000
</button>

<button onclick="comprarMejoraFija(500000,5000)">
    +5.000 por clic (500K)
</button>

<button onclick="comprarMejoraFija(1000000,10000)">
    +10.000 por clic (1M)
</button>

<button onclick="comprarMejoraFija(5000000,25000)">
    +25.000 por clic (5M)
</button>

<button onclick="comprarMejoraFija(10000000,50000)">
    +50.000 por clic (10M)
</button>

<button onclick="comprarMejoraFija(25000000,100000)">
    +100.000 por clic (25M)
</button>

</div>

<audio id="musicaFondo" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<audio id="sonidoCaja">
    <source src="caja.mp3" type="audio/mpeg">
</audio>

<div id="overlayCaja">
    <div id="cajaAnimada">🎁</div>
</div>

<script>

let prestigio = 0;

let puntos = 0;
let poderClick = 1;
let puntosPorSegundo = 1;

let multiplicadores = [1];
let ultimoTiempoCaja = 0;

function multiplicadorTotal() {
    return multiplicadores.reduce((a,b) => a * b, 1);
}

function sumarClick() {
    puntos += poderClick * multiplicadorTotal();
    actualizar();
}

function eventoAleatorio() {

    let r = Math.random();

    // 💰 evento positivo
    if (r < 0.4) {
        let bonus = 1000 + prestigio * 500;
        puntos += bonus;
        alert("💰 Evento: +" + bonus + " puntos");
    }

    // ⚡ doble click
    else if (r < 0.7) {
        poderClick *= 2;
        alert("⚡ Evento: x2 click por 15s");

        setTimeout(() => {
            poderClick /= 2;
        }, 15000);
    }

    // 💣 negativo
    else {
        puntos *= 0.9;
        alert("💣 Evento: -10% puntos");
    }

    actualizar();
}

function comprarMejoraFija(costo, aumento) {
    if (puntos >= costo) {
        puntos -= costo;
        poderClick += aumento;
        actualizar();
    }
}

function abrirCaja() {

    let ahora = Date.now();

    document.getElementById("sonidoCaja").currentTime = 0;
    document.getElementById("sonidoCaja").play();

    if (ahora - ultimoTiempoCaja < 600000) {
        let falta = Math.ceil((600000 - (ahora - ultimoTiempoCaja)) / 1000);
        alert("Espera " + falta + " segundos");
        return;
    }

    ultimoTiempoCaja = ahora;

    const overlay = document.getElementById("overlayCaja");
    const caja = document.getElementById("cajaAnimada");

    overlay.style.display = "flex";

    caja.style.animation = "none";
    caja.offsetHeight;
    caja.style.animation = "abrirCaja 0.8s ease-in-out";

    setTimeout(() => {
        overlay.style.display = "none";
    }, 1500);

    let r = Math.random();
    let nombre = "";
    let multi = 1;

    if (r < 0.5) { nombre = "Común"; multi = 1.05; }
    else if (r < 0.8) { nombre = "Raro"; multi = 1.1; }
    else if (r < 0.93) { nombre = "Épico"; multi = 1.2; }
    else if (r < 0.98) { nombre = "Legendario"; multi = 1.4; }
    else { nombre = "Mítico"; multi = 2; }

    multiplicadores.push(multi);

    document.getElementById("inventario").innerText =
        "Inventario: " + multiplicadores.map(m => "x" + m.toFixed(2)).join(" ");

    setTimeout(() => {
        alert("Obtuviste: " + nombre + " (x" + multi + ")");
    }, 500);
}
function prestigiar() {

    if (puntos >= 1000000) {

        puntos = 0;
        poderClick = 1;
        puntosPorSegundo = 1;
        multiplicadores = [1];

        prestigio++;

        alert("👑 Prestigio activado! Bonus global x" + (1 + prestigio * 0.2));

        actualizar();

    } else {
        alert("Necesitas 1.000.000 puntos para prestigiar");
    }
}
function actualizar() {

    document.getElementById("contador").innerText = Math.floor(puntos);
    document.getElementById("pps").innerText = "Multiplicador: x" + multiplicadorTotal().toFixed(2);
}

function reiniciarJuego() {
    localStorage.clear();
    location.reload();
}

/* MÚSICA */
window.addEventListener("click", () => {
    const musica = document.getElementById("musicaFondo");
    if (musica.paused) {
        musica.volume = 0.3;
        musica.play();
    }
});

setInterval(() => {
    puntos += puntosPorSegundo * multiplicadorTotal();
    actualizar();
}, 1000);

setInterval(() => {

    if (Math.random() < 0.25) {
        eventoAleatorio();
    }

}, 45000);

actualizar();

</script>

</body>
</html>
